name: test Api

on: 
  push:
    branches: [ 'main']
  pull_request: 
    branches: [ 'main']

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python: "3.11"
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
      - name: Check Unit Tests
        run: |
          pytest - v
      - name: Basic Import Check
        run: |
          python -c "from app.main import app; print('App imports sucessful')"

  
  Docker-Test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Docker
        uses: actions/checkout@v4
      
      - name: Build Docker Image
        run: |
          docker build -t taxi-api .
      
      - name: Docker running
        run:
          docker run -d -p 8000:8000 taxi-api
          sleep 10
          curl http://localhost:8000/ || exit 1
          docker stop api